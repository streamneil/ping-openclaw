<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OPENCLAW // AGENT CONSOLE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ══════════════════════════════════════════════
       CSS VARIABLES & RESET
    ══════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #050d0a;
      --bg-mid:       #080f0c;
      --surface:      #0b1612;
      --surface2:     #0f1e18;
      --border:       #112518;
      --border-hi:    #1a4030;

      --accent:       #00e5a0;
      --accent-dim:   #00a872;
      --accent-glow:  rgba(0,229,160,0.15);
      --accent-glow2: rgba(0,229,160,0.06);

      --amber:        #f0b429;
      --red:          #f05252;
      --red-dim:      rgba(240,82,82,0.12);

      --text:         #c8ede3;
      --text-mid:     #7aab96;
      --text-muted:   #3d6b58;

      --font-ui:      'IBM Plex Sans', sans-serif;
      --font-mono:    'IBM Plex Mono', 'Share Tech Mono', monospace;
      --font-display: 'Share Tech Mono', monospace;

      --radius-sm: 4px;
      --radius:    8px;
      --radius-lg: 12px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      position: relative;
    }

    /* ── 全局扫描线背景纹理 ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0,229,160,0.018) 2px,
          rgba(0,229,160,0.018) 4px
        );
      pointer-events: none;
      z-index: 0;
    }

    /* ── 顶部光晕装饰 ── */
    body::after {
      content: '';
      position: fixed;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 240px;
      background: radial-gradient(ellipse, rgba(0,229,160,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ══════════════════════════════════════════════
       HEADER
    ══════════════════════════════════════════════ */
    header {
      position: relative;
      z-index: 10;
      flex-shrink: 0;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 24px;
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border-hi);
      box-shadow: 0 1px 0 rgba(0,229,160,0.08), 0 4px 24px rgba(0,0,0,0.4);
    }

    /* 左侧标识区 */
    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* OPENCLAW 徽标文字 */
    .logo {
      font-family: var(--font-display);
      font-size: 16px;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(0,229,160,0.5);
    }

    .logo-sep {
      color: var(--text-muted);
      font-family: var(--font-display);
      font-size: 14px;
    }

    .logo-sub {
      font-family: var(--font-display);
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    /* 中间版本号标签 */
    .header-center {
      font-family: var(--font-display);
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--text-muted);
      text-align: center;
      border: 1px solid var(--border-hi);
      padding: 4px 10px;
      border-radius: var(--radius-sm);
    }

    /* 右侧状态区 */
    .header-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
    }

    /* 状态指示器 */
    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border-hi);
      background: var(--surface2);
      transition: all 0.3s ease;
    }
    .status-pill.connected {
      border-color: rgba(0,229,160,0.3);
      background: rgba(0,229,160,0.06);
    }
    .status-pill.disconnected {
      border-color: rgba(240,82,82,0.3);
      background: rgba(240,82,82,0.06);
    }

    #status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--amber);
      transition: background 0.3s, box-shadow 0.3s;
      flex-shrink: 0;
    }
    .status-pill.connected    #status-dot {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    .status-pill.disconnected #status-dot {
      background: var(--red);
      box-shadow: 0 0 8px var(--red);
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    #status-text {
      font-family: var(--font-display);
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--text-mid);
    }

    /* ══════════════════════════════════════════════
       MAIN LAYOUT — sidebar + chat
    ══════════════════════════════════════════════ */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    /* ── 左侧装饰轨道 ── */
    .sidebar {
      width: 48px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 0;
      border-right: 1px solid var(--border);
      gap: 20px;
      background: var(--surface);
    }

    .sidebar-line {
      flex: 1;
      width: 1px;
      background: linear-gradient(to bottom,
        transparent,
        var(--border-hi) 20%,
        var(--border-hi) 80%,
        transparent
      );
    }

    .sidebar-node {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 1px solid var(--border-hi);
      background: var(--surface2);
      flex-shrink: 0;
    }

    .sidebar-label {
      font-family: var(--font-display);
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      text-transform: uppercase;
    }

    /* ══════════════════════════════════════════════
       CHAT AREA
    ══════════════════════════════════════════════ */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scroll-behavior: smooth;
    }

    /* 滚动条 */
    #chat::-webkit-scrollbar { width: 3px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb {
      background: var(--border-hi);
      border-radius: 2px;
    }
    #chat::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }

    /* ── 消息条目入场动画 ── */
    @keyframes msg-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      animation: msg-in 0.25s ease forwards;
      margin-bottom: 10px;
    }
    .msg-row.user  { flex-direction: row-reverse; }

    /* ── 头像 ── */
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 13px;
      margin-top: 2px;
      border: 1px solid var(--border-hi);
      background: var(--surface2);
      color: var(--text-mid);
      font-family: var(--font-display);
      letter-spacing: 0;
    }

    .msg-row.user .avatar {
      background: rgba(0,229,160,0.08);
      border-color: rgba(0,229,160,0.2);
      color: var(--accent);
    }

    /* ── 消息主体 ── */
    .msg-body {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: min(74%, 700px);
    }

    .msg-row.user .msg-body { align-items: flex-end; }

    /* 发送者标签行 */
    .msg-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 2px;
    }
    .msg-row.user .msg-meta { flex-direction: row-reverse; }

    .msg-sender {
      font-family: var(--font-display);
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .msg-row.user .msg-sender { color: rgba(0,229,160,0.5); }

    .msg-time {
      font-family: var(--font-display);
      font-size: 9px;
      color: var(--text-muted);
      opacity: 0.6;
    }

    /* ── 气泡 ── */
    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 13.5px;
      line-height: 1.65;
      word-break: break-word;
      position: relative;
    }

    /* Agent 气泡（左侧） */
    .msg-row.agent .bubble {
      background: var(--surface2);
      border: 1px solid var(--border-hi);
      border-top-left-radius: var(--radius-sm);
      color: var(--text);
    }

    /* 左侧气泡的竖线装饰 */
    .msg-row.agent .bubble::before {
      content: '';
      position: absolute;
      left: -1px;
      top: 12px;
      bottom: 12px;
      width: 2px;
      background: linear-gradient(to bottom, var(--accent), var(--accent-dim));
      border-radius: 2px;
      opacity: 0.6;
    }

    /* User 气泡（右侧） */
    .msg-row.user .bubble {
      background: rgba(0,229,160,0.07);
      border: 1px solid rgba(0,229,160,0.18);
      border-top-right-radius: var(--radius-sm);
      color: var(--text);
    }

    /* Error 气泡 */
    .msg-row.error .bubble {
      background: var(--red-dim);
      border: 1px solid rgba(240,82,82,0.25);
      color: #f08080;
    }
    .msg-row.error .bubble::before {
      background: linear-gradient(to bottom, var(--red), #c03030);
    }

    /* ── JSON 代码块 ── */
    .bubble pre {
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      margin: 0;
      color: #a0d8c8;
    }

    /* JSON 语法着色（关键字高亮） */
    .json-key   { color: #7ecfb3; }
    .json-str   { color: #b5e0a0; }
    .json-num   { color: #f0c070; }
    .json-bool  { color: #80c8f0; }
    .json-null  { color: #909090; }

    /* ── 系统消息 ── */
    .sys-msg {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 6px 0;
    }
    .sys-msg-line {
      flex: 1;
      height: 1px;
      background: var(--border);
      max-width: 80px;
    }
    .sys-msg-text {
      font-family: var(--font-display);
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    /* ══════════════════════════════════════════════
       INPUT BAR
    ══════════════════════════════════════════════ */
    #input-bar {
      position: relative;
      z-index: 10;
      flex-shrink: 0;
      padding: 16px 32px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border-hi);
      box-shadow: 0 -4px 24px rgba(0,0,0,0.3);
    }

    /* 输入行提示 */
    .input-hint {
      font-family: var(--font-display);
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .input-hint::before {
      content: '';
      display: inline-block;
      width: 16px;
      height: 1px;
      background: var(--border-hi);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    /* 输入框容器（带聚焦光晕） */
    .input-wrap {
      flex: 1;
      position: relative;
      border-radius: var(--radius);
      border: 1px solid var(--border-hi);
      background: var(--bg-mid);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrap:focus-within {
      border-color: rgba(0,229,160,0.4);
      box-shadow: 0 0 0 3px var(--accent-glow2), 0 0 16px var(--accent-glow);
    }

    /* 左侧提示符 */
    .input-wrap::before {
      content: '>';
      position: absolute;
      left: 14px;
      top: 12px;
      font-family: var(--font-display);
      font-size: 14px;
      color: var(--accent);
      opacity: 0.5;
      pointer-events: none;
      line-height: 1;
    }

    #input {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 11px 14px 11px 30px;
      resize: none;
      height: 44px;
      max-height: 160px;
      overflow-y: auto;
      outline: none;
      line-height: 1.55;
      caret-color: var(--accent);
    }
    #input::placeholder {
      color: var(--text-muted);
      font-family: var(--font-display);
      font-size: 11px;
      letter-spacing: 0.05em;
    }

    /* 发送按钮 */
    #send-btn {
      flex-shrink: 0;
      height: 44px;
      padding: 0 22px;
      background: rgba(0,229,160,0.1);
      color: var(--accent);
      border: 1px solid rgba(0,229,160,0.25);
      border-radius: var(--radius);
      font-family: var(--font-display);
      font-size: 12px;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
    }
    #send-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    #send-btn:hover:not(:disabled) {
      border-color: rgba(0,229,160,0.5);
      box-shadow: 0 0 16px var(--accent-glow);
      color: #fff;
    }
    #send-btn:hover:not(:disabled)::before { opacity: 0.12; }
    #send-btn:active:not(:disabled) { transform: scale(0.97); }
    #send-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* 按钮内图标 + 文字 */
    .btn-inner {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .btn-arrow {
      font-size: 14px;
      transition: transform 0.2s;
    }
    #send-btn:hover:not(:disabled) .btn-arrow { transform: translateX(3px); }

    /* 底部快捷键提示 */
    .shortcut-hint {
      display: flex;
      gap: 16px;
      margin-top: 8px;
    }
    .kbd {
      font-family: var(--font-display);
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--text-muted);
    }
    .kbd span {
      display: inline-block;
      border: 1px solid var(--border-hi);
      border-radius: 3px;
      padding: 1px 5px;
      margin-right: 4px;
      background: var(--surface2);
    }

    /* ══════════════════════════════════════════════
       打字机光标动画（消息出现时）
    ══════════════════════════════════════════════ */
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    .typing-cursor::after {
      content: '▌';
      font-family: var(--font-display);
      color: var(--accent);
      animation: blink 0.8s step-end infinite;
      margin-left: 2px;
      font-size: 0.9em;
    }

    /* ══════════════════════════════════════════════
       欢迎空态
    ══════════════════════════════════════════════ */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      opacity: 0.4;
      pointer-events: none;
      animation: msg-in 0.6s ease forwards;
    }
    .empty-logo {
      font-family: var(--font-display);
      font-size: 28px;
      letter-spacing: 0.2em;
      color: var(--accent);
    }
    .empty-sub {
      font-family: var(--font-display);
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<!-- ═══ 顶部标题栏 ═══ -->
<header>
  <div class="header-left">
    <div class="logo">OPENCLAW</div>
    <div class="logo-sep">//</div>
    <div class="logo-sub">Agent Console</div>
  </div>

  <div class="header-center">PROXY v1.0</div>

  <div class="header-right">
    <div class="status-pill" id="status-pill">
      <div id="status-dot"></div>
      <span id="status-text">INIT</span>
    </div>
  </div>
</header>

<!-- ═══ 主体区域 ═══ -->
<div class="main">

  <!-- 左侧装饰轨道 -->
  <div class="sidebar">
    <div class="sidebar-node"></div>
    <div class="sidebar-line"></div>
    <div class="sidebar-label">STREAM</div>
    <div class="sidebar-line"></div>
    <div class="sidebar-node"></div>
  </div>

  <!-- 消息流 -->
  <div id="chat">
    <div class="empty-state" id="empty-state">
      <div class="empty-logo">⬡</div>
      <div class="empty-sub">Awaiting Connection</div>
    </div>
  </div>

</div>

<!-- ═══ 底部输入区 ═══ -->
<div id="input-bar">
  <div class="input-hint">INPUT TERMINAL</div>
  <div class="input-row">
    <div class="input-wrap">
      <textarea
        id="input"
        placeholder='输入 JSON 指令或任意文本...'
        spellcheck="false"
      ></textarea>
    </div>
    <button id="send-btn" disabled>
      <div class="btn-inner">
        SEND <span class="btn-arrow">→</span>
      </div>
    </button>
  </div>
  <div class="shortcut-hint">
    <div class="kbd"><span>Enter</span>发送</div>
    <div class="kbd"><span>Shift</span><span>Enter</span>换行</div>
  </div>
</div>

<script>
  // ─── DOM 引用 ──────────────────────────────────────────────────────────────
  const chatEl      = document.getElementById('chat');
  const inputEl     = document.getElementById('input');
  const sendBtn     = document.getElementById('send-btn');
  const statusDot   = document.getElementById('status-dot');
  const statusText  = document.getElementById('status-text');
  const statusPill  = document.getElementById('status-pill');
  const emptyState  = document.getElementById('empty-state');

  // ─── WebSocket 连接 ────────────────────────────────────────────────────────
  const WS_URL = `ws://${location.host}`;
  let ws = null;

  function connect() {
    updateStatus('connecting');
    ws = new WebSocket(WS_URL);

    ws.addEventListener('open', () => {
      // 代理已连上，但 Openclaw 还没握手完成；等 proxy_status=ready 再标 ONLINE
      updateStatus('connecting');
      sendBtn.disabled = true;
      appendSystemMsg('PROXY LINK · WAITING FOR UPSTREAM');
    });

    ws.addEventListener('message', (event) => {
      // proxy_status 系统消息由代理层注入，不走对话气泡
      try {
        const obj = JSON.parse(event.data);
        if (obj && obj.type === 'proxy_status') {
          handleProxyStatus(obj);
          return;
        }
        if (obj && obj.type === 'proxy_error') {
          // 兼容老版本错误格式
          handleProxyStatus({ state: 'error', message: obj.message });
          return;
        }
      } catch (_) { /* 非 JSON，走透传 */ }
      renderAgentMessage(event.data);
    });

    function handleProxyStatus({ state, message }) {
      if (state === 'ready') {
        updateStatus('connected');
        sendBtn.disabled = false;
        appendSystemMsg('UPSTREAM READY · OPENCLAW ONLINE');
      } else if (state === 'connecting') {
        updateStatus('connecting');
        sendBtn.disabled = true;
      } else if (state === 'closed') {
        updateStatus('disconnected');
        sendBtn.disabled = true;
        appendSystemMsg(message ? `LINK DOWN · ${message.toUpperCase()}` : 'LINK DOWN');
      } else if (state === 'error') {
        updateStatus('disconnected');
        sendBtn.disabled = true;
        renderProxyError(message || 'unknown error');
      }
    }

    function renderProxyError(text) {
      hideEmpty();
      const row = document.createElement('div');
      row.className = 'msg-row agent error';
      row.innerHTML = `
        <div class="avatar">OC</div>
        <div class="msg-body">
          <div class="msg-meta">
            <span class="msg-sender">ERROR</span>
            <span class="msg-time">${getTime()}</span>
          </div>
          <div class="bubble">⚠ ${escapeHtml(text)}</div>
        </div>`;
      appendAndScroll(row);
    }

    ws.addEventListener('close', (e) => {
      updateStatus('disconnected');
      sendBtn.disabled = true;
      appendSystemMsg(`LINK LOST (code=${e.code}) · RETRY IN 3s`);
      setTimeout(connect, 3000);
    });

    ws.addEventListener('error', () => {
      updateStatus('disconnected');
      appendSystemMsg('CONNECTION ERROR');
    });
  }

  // ─── 发送消息 ──────────────────────────────────────────────────────────────
  function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

    hideEmpty();
    appendUserMessage(text);
    ws.send(text);

    inputEl.value = '';
    inputEl.style.height = '44px';
  }

  // ─── 隐藏空态占位 ─────────────────────────────────────────────────────────
  function hideEmpty() {
    if (emptyState && emptyState.parentNode) {
      emptyState.remove();
    }
  }

  // ─── 渲染：用户消息（右侧） ────────────────────────────────────────────────
  function appendUserMessage(text) {
    hideEmpty();
    const row = document.createElement('div');
    row.className = 'msg-row user';
    row.innerHTML = `
      <div class="avatar">YOU</div>
      <div class="msg-body">
        <div class="msg-meta">
          <span class="msg-sender">USER</span>
          <span class="msg-time">${getTime()}</span>
        </div>
        <div class="bubble">${escapeHtml(text)}</div>
      </div>
    `;
    appendAndScroll(row);
  }

  // ─── 渲染：Agent 消息（左侧）─────────────────────────────────────────────
  // 识别 openclaw-studio 风格帧：
  //   {type:"event", event, payload}   — gateway 单向推送
  //   {type:"res",   ok, method, payload|error}  — 对我们请求的应答
  // 其它未知 JSON 原样展示。
  function renderAgentMessage(raw) {
    hideEmpty();
    let parsed = null;
    try { parsed = JSON.parse(raw); } catch (_) { /* 纯文本 */ }

    if (parsed && parsed.type === 'res') {
      const label = parsed.ok ? `RES · ${parsed.method}` : `ERR · ${parsed.method}`;
      const body = parsed.ok
        ? JSON.stringify(parsed.payload ?? {}, null, 2)
        : `${parsed.error?.code || 'ERROR'}: ${parsed.error?.message || ''}`;
      return appendAgentBubble(label, body, parsed.ok ? 'json' : 'error');
    }

    if (parsed && parsed.type === 'event') {
      // chat.* 事件的 payload.delta / payload.text 直接当对话内容渲染
      const ev = parsed.event || 'event';
      const maybeText = extractChatText(parsed);
      if (maybeText !== null) {
        return appendAgentBubble(`EVENT · ${ev}`, maybeText, 'text');
      }
      const body = JSON.stringify(parsed.payload ?? {}, null, 2);
      return appendAgentBubble(`EVENT · ${ev}`, body, 'json');
    }

    if (parsed !== null) {
      return appendAgentBubble('AGENT', JSON.stringify(parsed, null, 2), 'json');
    }
    appendAgentBubble('AGENT', raw, 'text');
  }

  function extractChatText(frame) {
    const p = frame.payload;
    if (!p || typeof p !== 'object') return null;
    if (typeof p.delta === 'string') return p.delta;
    if (typeof p.text === 'string') return p.text;
    if (typeof p.content === 'string') return p.content;
    return null;
  }

  function appendAgentBubble(senderLabel, bodyText, kind) {
    const row = document.createElement('div');
    row.className = 'msg-row agent' + (kind === 'error' ? ' error' : '');
    const bubble =
      kind === 'json' ? `<div class="bubble"><pre>${highlightJson(bodyText)}</pre></div>`
                      : `<div class="bubble">${escapeHtml(bodyText)}</div>`;
    row.innerHTML = `
      <div class="avatar">OC</div>
      <div class="msg-body">
        <div class="msg-meta">
          <span class="msg-sender">${escapeHtml(senderLabel)}</span>
          <span class="msg-time">${getTime()}</span>
        </div>
        ${bubble}
      </div>
    `;
    appendAndScroll(row);
  }

  // ─── 渲染：系统消息（居中分隔线） ────────────────────────────────────────
  function appendSystemMsg(msg) {
    hideEmpty();
    const el = document.createElement('div');
    el.className = 'sys-msg';
    el.innerHTML = `
      <div class="sys-msg-line"></div>
      <div class="sys-msg-text">${escapeHtml(msg)}</div>
      <div class="sys-msg-line"></div>
    `;
    appendAndScroll(el);
  }

  // ─── 工具：滚动到底部 ─────────────────────────────────────────────────────
  function appendAndScroll(el) {
    chatEl.appendChild(el);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  // ─── 工具：更新状态指示 ───────────────────────────────────────────────────
  function updateStatus(state) {
    const labels = {
      connecting:   'CONNECTING',
      connected:    'ONLINE',
      disconnected: 'OFFLINE',
    };
    statusPill.className = 'status-pill ' + (
      state === 'connected'    ? 'connected' :
      state === 'disconnected' ? 'disconnected' : ''
    );
    statusText.textContent = labels[state] || state.toUpperCase();
  }

  // ─── 工具：时间戳 ────────────────────────────────────────────────────────
  function getTime() {
    return new Date().toLocaleTimeString('zh-CN', { hour12: false });
  }

  // ─── 工具：XSS 防护 ──────────────────────────────────────────────────────
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ─── 工具：JSON 语法着色 ─────────────────────────────────────────────────
  // 对格式化后的 JSON 字符串逐行替换，为不同类型加颜色 span
  function highlightJson(json) {
    // 先转义 HTML，再做 span 替换（避免 XSS）
    return escapeHtml(json).replace(
      /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
      (match) => {
        if (/^"/.test(match)) {
          if (/:$/.test(match)) {
            // JSON key
            return `<span class="json-key">${match}</span>`;
          }
          // JSON string value
          return `<span class="json-str">${match}</span>`;
        }
        if (/true|false/.test(match)) return `<span class="json-bool">${match}</span>`;
        if (/null/.test(match))       return `<span class="json-null">${match}</span>`;
        return `<span class="json-num">${match}</span>`;
      }
    );
  }

  // ─── 输入框：Enter 发送 / Shift+Enter 换行 / 自动撑高 ────────────────────
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = '44px';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  sendBtn.addEventListener('click', sendMessage);

  // ─── 启动 ────────────────────────────────────────────────────────────────
  connect();
</script>
</body>
</html>
